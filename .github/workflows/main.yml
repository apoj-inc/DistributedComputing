name: Test flow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build-cmake:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install MongoDB C++ driver deps
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev libsasl2-dev zlib1g-dev

    - name: Configure CMake
      run: cmake --preset x86_64-linux -S ${{github.workspace}} -B ${{github.workspace}}/build/x86_64-linux -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -G Ninja

    - name: Build
      run: cmake --build ${{github.workspace}}/build/x86_64-linux  --config ${{env.BUILD_TYPE}}

    - name: Prepare build for artifact
      shell: bash
      run: tar -czf build.tar.gz build
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: cmake-build
        path: build.tar.gz

  pytest:
    runs-on: ubuntu-latest
    needs: build-cmake
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m venv ${{github.workspace}}/.venv
        source ${{github.workspace}}/.venv/bin/activate && python -m pip install -r requirements.txt

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: cmake-build
        path: ${{github.workspace}}

    - name: Unpack build artifact
      shell: bash
      run: tar -xzf ${{github.workspace}}/build.tar.gz -C ${{github.workspace}}

    - name: Unpack cmake for docker
      shell: bash
      run: |
       mkdir bin
       cp build/x86_64-linux/src/master/dc_master bin
       cp build/x86_64-linux/src/worker/dc_worker bin
       cp build/x86_64-linux/src/cli/dc_cli bin

    - name: Run pytest
      run: source ${{github.workspace}}/.venv/bin/activate && python -m pytest -v
