name: Test flow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build-cmake:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dc_master
        path: ${{ runner.temp }}/dc_master.tar

  build-master:
    runs-on: ubuntu=latest
    needs: build-cmake
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract SHA
      id: meta
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      
    - name: Build and push amd64-arch production image
      uses: docker/build-push-action@v6
      with:
        context: ".docker/altera_tools"
        platforms: linux/amd64
        target: master
        tags: |
          dc_master:latest
          dc_master:${{ steps.meta.outputs.SHORT_SHA }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: false
        outputs: type=docker,dest=${{ runner.temp }}/dc_master.tar

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dc_master
        path: ${{ runner.temp }}/dc_master.tar

  build-worker:
    runs-on: ubuntu=latest
    needs: build-cmake
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract SHA
      id: meta
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      
    - name: Build and push amd64-arch production image
      uses: docker/build-push-action@v6
      with:
        context: ".docker/altera_tools"
        platforms: linux/amd64
        target: worker
        tags: |
          dc_worker:latest
          dc_worker:${{ steps.meta.outputs.SHORT_SHA }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: false
        outputs: type=docker,dest=${{ runner.temp }}/dc_worker.tar

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dc_worker
        path: ${{ runner.temp }}/dc_worker.tar

  build-cli:
    runs-on: ubuntu=latest
    needs: build-cmake
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract SHA
      id: meta
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      
    - name: Build and push amd64-arch production image
      uses: docker/build-push-action@v6
      with:
        context: ".docker/altera_tools"
        platforms: linux/amd64
        target: cli
        tags: |
          dc_master:latest
          dc_master:${{ steps.meta.outputs.SHORT_SHA }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: false
        outputs: type=docker,dest=${{ runner.temp }}/dc_master.tar

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dc_master
        path: ${{ runner.temp }}/dc_master.tar
